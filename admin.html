<!DOCTYPE html>
<html>
<head>

<title>Admin Location Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:#222;
color:white;
padding:20px;
font-size:24px;
}

#map{
height:500px;
width:90%;
margin:auto;
margin-top:20px;
}
</style>

</head>

<body>

<header>Admin Location Tracker</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.appspot.com",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var map = L.map('map').setView([23.8103,90.4125],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

async function loadLocations(){

const querySnapshot = await getDocs(collection(db,"locations"));

querySnapshot.forEach((doc)=>{

let data = doc.data();

L.marker([data.latitude,data.longitude])
.addTo(map)
.bindPopup("User location");

});

}

loadLocations();

</script>

</body>
</html>
