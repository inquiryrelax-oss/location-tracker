<!DOCTYPE html>
<html>

<head>
<title>Live User Tracking Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;}

header{
background:#000;
padding:15px;
text-align:center;
font-size:22px;
position:relative;
}

#logout{
position:absolute;
right:15px;
top:10px;
}

#map{
height:350px;
width:95%;
margin:auto;
margin-top:10px;
border-radius:8px;
}

table{
width:95%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

th{background:#222;padding:10px;}
td{padding:8px;border-bottom:1px solid #333;text-align:center;}

button{
padding:5px 10px;
background:#ff4b5c;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.typeGPS{color:#00ff99;font-weight:bold;}
.typeIP{color:#ffcc00;font-weight:bold;}
</style>
</head>

<body>

<header>
🌍 Live User Tracking Dashboard
<button id="logout" onclick="logout()">Logout</button>
</header>

<div id="map"></div>

<table>
<tr>
<th>Time</th>
<th>Country</th>
<th>Thana</th>
<th>District</th>
<th>IP</th>
<th>ISP</th>
<th>Device</th>
<th>Model</th>
<th>Type</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Map</th>
</tr>
<tbody id="tableData"></tbody>
</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain:"location-tracker-bba55.firebaseapp.com",
projectId:"location-tracker-bba55"
});

const db = getFirestore(app);
const auth = getAuth(app);

// ✅ FIXED AUTH (NO RELOAD LOOP)
onAuthStateChanged(auth, user=>{
if(!user){
console.log("Not logged in")
}
})

window.logout = function(){
signOut(auth)
}

// MAP
var map = L.map('map').setView([23.7,90.4],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

const table = document.getElementById("tableData")

window.openMap = function(lat,lon){
window.open(`https://www.google.com/maps?q=${lat},${lon}`)
}

window.zoomToUser = function(lat, lon){

if(!lat || !lon) return

map.flyTo([lat, lon], 12, {
duration: 1.5
})

// optional: highlight marker
L.marker([lat, lon]).addTo(map)

}

// ✅ OPTIMIZED SNAPSHOT (NO FLICKER)
onSnapshot(collection(db,"locations"),snapshot=>{

let rows = ""
let markers = []

snapshot.forEach(doc=>{

let data = doc.data()

let typeClass = data.type === "GPS" ? "typeGPS" : "typeIP"

rows += `
<tr onclick="zoomToUser(${data.latitude},${data.longitude})" style="cursor:pointer;">
<td>${data.time || ""}</td>
<td>${data.country || "unknown"}</td>
<td>${data.thana || "unknown"}</td>
<td>${data.district || "unknown"}</td>
<td>${data.ip || ""}</td>
<td>${data.isp || ""}</td>
<td>${data.device || ""}</td>
<td>${data.deviceModel || ""}</td>
<td class="${typeClass}">${data.type || ""}</td>
<td>${data.latitude || ""}</td>
<td>${data.longitude || ""}</td>
<td><button onclick="openMap(${data.latitude},${data.longitude})">View</button></td>
</tr>
`

if(data.latitude && data.longitude){
markers.push([data.latitude,data.longitude])
}

})

// update once (smooth)
table.innerHTML = rows

// clear old markers
map.eachLayer(layer=>{
if(layer instanceof L.Marker) map.removeLayer(layer)
})

// add new markers
markers.forEach(m=>{
L.marker(m).addTo(map)
})

})

</script>

</body>
</html>
