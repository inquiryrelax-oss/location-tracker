<!DOCTYPE html>
<html>

<head>

<title>Live User Tracking Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
background:#000;
padding:15px;
text-align:center;
font-size:22px;
}

#map{
height:350px;
width:95%;
margin:auto;
margin-top:10px;
border-radius:8px;
}

table{
width:95%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#222;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #333;
text-align:center;
}

.flag{
width:25px;
}

.device{
font-size:20px;
}

</style>

</head>

<body>

<header>
🌍 Live User Tracking Dashboard
</header>

<div id="map"></div>

<table>

<tr>

<th>Time</th>
<th>Country</th>
<th>City</th>
<th>IP</th>
<th>ISP</th>
<th>Device</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Live Maps</th>

</tr>

<tbody id="tableData"></tbody>

</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.appspot.com",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var map = L.map('map').setView([23.7,90.4],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

const table = document.getElementById("tableData")

onSnapshot(collection(db,"locations"),snapshot=>{

table.innerHTML=""

snapshot.forEach(doc=>{

let data = doc.data()

let flag=""

if(data.country_code){

flag=`<img class="flag" src="https://flagcdn.com/24x18/${data.country_code.toLowerCase()}.png">`

}

let deviceIcon="💻"

if(data.device=="Mobile") deviceIcon="📱"

let row = `

<tr>

<td>${data.time}</td>

<td>${flag} ${data.country || "unknown"}</td>

<td>${data.city || "unknown"}</td>

<td>${data.ip || "unknown"}</td>

<td>${data.isp || "unknown"}</td>

<td class="device">${deviceIcon}</td>

<td>${data.latitude}</td>

<td>${data.longitude}</td>

<td>
<button onclick="openMap(${data.latitude},${data.longitude})">
View
</button>
</td>

</tr>

`

table.innerHTML += row

L.marker([data.latitude,data.longitude]).addTo(map)

})

})

function openMap(lat,lon){

let url = "https://www.google.com/maps?q="+lat+","+lon

window.open(url,"_blank")

}

</script>


</body>

</html>
